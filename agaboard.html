<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AGA Board</title>
<link rel="manifest" href="data:application/json,{}">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AGA Board">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0F1117;--bg2:#1A1D27;--bg3:#252837;--bg4:#2E3247;
  --accent:#4F6EF7;--accent2:#7C3AED;--accent3:#059669;--accent4:#D97706;--accent5:#DC2626;
  --text:#E8EAF0;--text2:#9BA3BF;--text3:#5B6280;
  --border:#2E3247;--border2:#3D4466;
  --card:#1E2130;--card2:#252837;
  --radius:10px;--radius2:14px;
  --shadow:0 2px 12px rgba(0,0,0,.4);
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;font-size:14px}

/* AUTH SCREEN */
.auth-screen{display:flex;align-items:center;justify-content:center;flex:1;padding:20px}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center}
.auth-logo i{font-size:32px;color:var(--accent)}
.auth-logo span{font-size:24px;font-weight:600;color:#fff}
.auth-title{font-size:20px;font-weight:600;margin-bottom:6px;text-align:center}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:28px;text-align:center}
.auth-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:24px;gap:3px}
.auth-tab{flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text2);background:transparent;transition:all .15s}
.auth-tab.active{background:var(--bg2);color:var(--text)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.btn-auth{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:4px}
.btn-auth:hover{background:#3d5be0}
.auth-error{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:16px;display:none}

/* APP */
.app{display:none;flex-direction:column;height:100%}
.app.visible{display:flex}

/* HEADER */
.header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100}
.logo{font-size:16px;font-weight:600;color:#fff;display:flex;align-items:center;gap:7px}
.logo i{color:var(--accent);font-size:18px}
.board-selector{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;cursor:pointer}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#3d5be0}
.btn-sm{padding:5px 9px;font-size:11px}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;color:#fff;flex-shrink:0;cursor:pointer}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.toolbar::-webkit-scrollbar{display:none}
.view-toggle{display:flex;background:var(--bg3);border-radius:7px;padding:2px;gap:1px;flex-shrink:0}
.view-btn{padding:4px 9px;border-radius:5px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--text2);background:transparent;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap}
.view-btn.active{background:var(--bg2);color:var(--text)}
.search-box{display:flex;align-items:center;gap:5px;padding:4px 9px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text2);flex-shrink:0}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:12px;width:120px;font-family:'DM Sans',sans-serif}
.search-box input::placeholder{color:var(--text3)}
.sync-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;flex-shrink:0}
.sync-ok{background:rgba(5,150,105,.15);color:#34d399}
.sync-saving{background:rgba(217,119,6,.15);color:#fbbf24}

/* BOARD */
.board-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.board{display:flex;gap:12px;padding:16px;overflow-x:auto;overflow-y:hidden;flex:1;align-items:flex-start}
.board::-webkit-scrollbar{height:5px}
.board::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* COLUMN */
.column{flex-shrink:0;width:272px;background:var(--bg2);border-radius:var(--radius2);border:1px solid var(--border);display:flex;flex-direction:column;max-height:calc(100vh - 130px)}
.col-header{padding:11px 12px 8px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.col-title{font-weight:600;font-size:12px;flex:1;color:var(--text)}
.col-count{background:var(--bg3);color:var(--text2);font-size:10px;font-weight:500;padding:1px 6px;border-radius:8px}
.col-menu-btn{color:var(--text3);cursor:pointer;padding:3px;border-radius:5px;font-size:15px;background:none;border:none;display:flex;align-items:center}
.col-menu-btn:hover{background:var(--bg3);color:var(--text)}
.col-cards{padding:3px 7px 7px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:7px;min-height:40px}
.col-cards::-webkit-scrollbar{width:3px}
.col-cards::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.add-card-btn{display:flex;align-items:center;gap:5px;margin:2px 7px 9px;padding:6px 9px;border-radius:7px;border:1.5px dashed var(--border2);color:var(--text3);cursor:pointer;font-size:11px;background:none;font-family:'DM Sans',sans-serif;transition:all .15s}
.add-card-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,110,247,.05)}
.add-col-btn{flex-shrink:0;width:52px;background:rgba(255,255,255,.04);border:1.5px dashed var(--border2);border-radius:var(--radius2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:20px;min-height:100px;transition:all .15s;align-self:flex-start}
.add-col-btn:hover{background:rgba(255,255,255,.07);color:var(--text)}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:11px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.card:hover{border-color:var(--border2);background:var(--card2);transform:translateY(-1px);box-shadow:var(--shadow)}
.card.dragging{opacity:.4;transform:rotate(1.5deg)}
.card-priority-bar{width:3px;position:absolute;left:0;top:0;bottom:0}
.card-labels{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:7px}
.label-dot{height:5px;border-radius:3px;min-width:28px}
.card-title{font-size:12px;font-weight:500;color:var(--text);line-height:1.5;margin-bottom:7px}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.meta-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text2)}
.meta-item i{font-size:12px}
.meta-item.overdue{color:#f87171}
.meta-item.due-soon{color:#fbbf24}
.meta-item.done-check{color:var(--accent3)}
.drop-zone{background:rgba(79,110,247,.08);border:2px dashed var(--accent);border-radius:var(--radius);height:50px;flex-shrink:0;border-radius:var(--radius)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:660px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6);transform:translateY(16px);transition:transform .2s}
.overlay.open .modal{transform:translateY(0)}
.modal-header{padding:18px 20px 0;display:flex;align-items:flex-start;gap:10px}
.modal-title{font-size:16px;font-weight:600;color:var(--text);border:none;background:none;outline:none;width:100%;font-family:'DM Sans',sans-serif;line-height:1.4}
.modal-col-label{font-size:11px;color:var(--text3);margin-top:2px}
.modal-close{color:var(--text3);cursor:pointer;padding:5px;border-radius:6px;font-size:17px;background:none;border:none;flex-shrink:0}
.modal-close:hover{background:var(--bg3);color:var(--text)}
.modal-body{display:grid;grid-template-columns:1fr 188px;padding:0 20px 20px}
.modal-main{padding-top:14px}
.modal-sidebar{padding-top:14px;padding-left:14px;border-left:1px solid var(--border)}
.sec-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;margin-top:14px}
.sec-label:first-child{margin-top:0}
.label-pills{display:flex;gap:5px;flex-wrap:wrap}
.label-pill{padding:3px 9px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s}
.desc-area{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;resize:vertical;min-height:80px;outline:none;line-height:1.6}
.desc-area:focus{border-color:var(--accent)}
.checklist{display:flex;flex-direction:column;gap:5px;margin-top:4px}
.check-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;background:var(--bg3)}
.check-item input[type=checkbox]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.check-text{font-size:12px;flex:1;color:var(--text);background:none;border:none;outline:none;font-family:'DM Sans',sans-serif}
.check-text.done{text-decoration:line-through;color:var(--text3)}
.progress-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:7px}
.progress-fill{height:100%;background:var(--accent3);border-radius:2px;transition:width .3s}
.comment-row{display:flex;gap:8px;align-items:flex-start;margin-top:7px}
.comment-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;resize:none;min-height:36px}
.comment-input:focus{border-color:var(--accent)}
.comment-item{display:flex;gap:7px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border)}
.sidebar-btn{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--text2);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;text-align:left;margin-bottom:5px;transition:all .15s}
.sidebar-btn:hover{background:var(--bg3);color:var(--text)}
.date-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:6px 9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none}
.date-input:focus{border-color:var(--accent)}
.priority-sel{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:6px 9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;cursor:pointer}

/* CALENDAR */
.cal-view{display:none;flex-direction:column;flex:1;padding:14px;gap:12px;overflow:auto}
.cal-view.active{display:flex}
.cal-header{display:flex;align-items:center;gap:10px}
.cal-nav{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:7px;overflow:hidden}
.cal-nav button{border:none;background:none;color:var(--text2);padding:5px 9px;cursor:pointer;font-size:15px;display:flex;align-items:center}
.cal-nav button:hover{background:var(--bg3);color:var(--text)}
.cal-month{font-size:15px;font-weight:600;padding:0 8px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:10px;overflow:hidden;flex:1}
.cal-day-name{background:var(--bg2);padding:6px;font-size:10px;font-weight:600;color:var(--text3);text-align:center;text-transform:uppercase}
.cal-day{background:var(--bg2);padding:6px;min-height:80px;cursor:pointer;transition:background .15s}
.cal-day:hover{background:var(--bg3)}
.cal-day.other-month .cal-num{color:var(--text3)}
.cal-day.today .cal-num{background:var(--accent);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.cal-num{font-size:11px;font-weight:500;margin-bottom:3px;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.cal-event{font-size:9px;padding:1px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}

/* LIST VIEW */
.list-view{display:none;flex:1;padding:14px;overflow-y:auto;flex-direction:column;gap:5px}
.list-view.active{display:flex}
.list-header{display:grid;grid-template-columns:1fr 140px 100px 90px;gap:10px;padding:5px 12px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border)}
.list-row{display:grid;grid-template-columns:1fr 140px 100px 90px;gap:10px;padding:7px 12px;border-radius:7px;cursor:pointer;font-size:12px;border:1px solid var(--border);background:var(--bg2);transition:background .1s;align-items:center}
.list-row:hover{background:var(--bg3)}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:10px 14px;font-size:12px;color:var(--text);display:flex;align-items:center;gap:7px;box-shadow:var(--shadow);transform:translateY(50px);opacity:0;transition:all .3s;z-index:9999;max-width:280px}
.toast.show{transform:translateY(0);opacity:1}
.toast i{color:var(--accent3);font-size:16px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:12px;color:var(--text2);font-size:13px}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .modal-body{grid-template-columns:1fr}
  .modal-sidebar{border-left:none;border-top:1px solid var(--border);padding-left:0;padding-top:14px}
  .col-title{font-size:11px}
  .board{padding:10px;gap:10px}
  .column{width:252px}
}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo"><i class="ti ti-layout-kanban"></i><span>AGA Board</span></div>
    <div class="auth-title">Witaj z powrotem</div>
    <div class="auth-sub">Twoja osobista tablica zadań</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Logowanie</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Rejestracja</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="auth-email" placeholder="twoj@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Hasło</label>
      <input class="form-input" type="password" id="auth-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <button class="btn-auth" id="auth-btn" onclick="doAuth()">Zaloguj się</button>
  </div>
</div>

<!-- LOADING -->
<div class="loading" id="loading-screen" style="display:none">
  <div class="spinner"></div>
  <span>Ładowanie danych...</span>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="header">
    <div class="logo"><i class="ti ti-layout-kanban"></i> AGA Board</div>
    <select class="board-selector" id="board-sel" onchange="switchBoard(this.value)">
      <option value="main">Zarządzanie projektami</option>
      <option value="marketing">Marketing & Sprzedaż</option>
      <option value="warehouse">Magazyn & Logistyka</option>
    </select>
    <div class="header-right">
      <button class="btn btn-ghost btn-sm" onclick="exportICS()"><i class="ti ti-calendar-export"></i> iCloud</button>
      <button class="btn btn-primary btn-sm" onclick="openNewCard()"><i class="ti ti-plus"></i> Nowa karta</button>
      <div class="avatar" id="user-avatar" title="Wyloguj" onclick="logout()">A</div>
    </div>
  </div>
  <div class="toolbar">
    <div class="view-toggle">
      <button class="view-btn active" id="vb-board" onclick="setView('board')"><i class="ti ti-layout-columns"></i> Tablica</button>
      <button class="view-btn" id="vb-cal" onclick="setView('calendar')"><i class="ti ti-calendar-month"></i> Kalendarz</button>
      <button class="view-btn" id="vb-list" onclick="setView('list')"><i class="ti ti-list"></i> Lista</button>
    </div>
    <div class="search-box"><i class="ti ti-search" style="font-size:13px"></i><input type="text" placeholder="Szukaj..." id="search-inp" oninput="render()"></div>
    <button class="btn btn-ghost btn-sm" onclick="sortByPriority()"><i class="ti ti-arrows-sort"></i> Sortuj</button>
    <span class="sync-badge sync-ok" id="sync-badge"><i class="ti ti-cloud-check"></i> Zsynchronizowano</span>
  </div>

  <div class="board-wrap" id="board-wrap">
    <div class="board" id="board"></div>
  </div>
  <div class="cal-view" id="cal-view">
    <div class="cal-header">
      <div class="cal-nav">
        <button onclick="calPrev()"><i class="ti ti-chevron-left"></i></button>
        <span class="cal-month" id="cal-month-label"></span>
        <button onclick="calNext()"><i class="ti ti-chevron-right"></i></button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="setView('board')"><i class="ti ti-x"></i> Zamknij</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="list-view" id="list-view">
    <div class="list-header"><span>Karta</span><span>Kolumna</span><span>Termin</span><span>Priorytet</span></div>
    <div id="list-rows"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOverlayOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div style="flex:1">
        <input class="modal-title" id="m-title" type="text" placeholder="Tytuł karty...">
        <div class="modal-col-label" id="m-col-label"></div>
      </div>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="modal-main">
        <div class="sec-label">Etykiety</div>
        <div class="label-pills" id="m-labels"></div>
        <div class="sec-label" style="margin-top:12px">Opis</div>
        <textarea class="desc-area" id="m-desc" placeholder="Dodaj opis..."></textarea>
        <div class="sec-label" style="margin-top:12px">Postęp (<span id="m-pct">0</span>%)</div>
        <div class="progress-bar"><div class="progress-fill" id="m-prog"></div></div>
        <div class="checklist" id="m-checklist"></div>
        <button class="add-card-btn" style="margin:7px 0 0;width:auto" onclick="addCheck()"><i class="ti ti-plus"></i> Dodaj element</button>
        <div class="sec-label" style="margin-top:12px">Komentarze</div>
        <div class="comment-row">
          <div class="avatar" style="width:26px;height:26px;font-size:10px;flex-shrink:0" id="comment-avatar">A</div>

// ---- DATA ----
async function loadData() {
  const ref = doc(db, 'boards', uid);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    const data = snap.data();
    columns = data.columns || getDefaultCols();
    cards = data.cards || getDefaultCards();
  } else {
    columns = getDefaultCols();
    cards = getDefaultCards();
    await saveToFirebase();
  }
  // realtime listener
  if (unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(ref, (s) => {
    if (s.exists() && !saveTimeout) {
      const d = s.data();
      columns = d.columns || columns;
      cards = d.cards || cards;
      render();
    }
  });
  render();
}

function getDefaultCols() {
  const cols = {};
  Object.entries(BOARD_COLS).forEach(([board, colArr]) => {
    colArr.forEach(c => { cols[board+'_'+c.id] = {...c, board, cards:[]}; });
  });
  return cols;
}

let cardCounter = 100;

async function saveToFirebase() {
  if (!uid) return;
  setSyncBadge(false);
  try {
    await setDoc(doc(db, 'boards', uid), { columns, cards }, { merge: false });
    setSyncBadge(true);
  } catch(e) { console.error(e); }
}

function scheduleSave() {
  if (saveTimeout) clearTimeout(saveTimeout);
  setSyncBadge(false);
  saveTimeout = setTimeout(async () => {
    saveTimeout = null;
    await saveToFirebase();
  }, 1200);
}

function setSyncBadge(ok) {
  const b = document.getElementById('sync-badge');

window.render = function() {
  const view = currentView;

function getColsForBoard(board) {
  return (BOARD_COLS[board]||[]).map(c => {
    const key = board+'_'+c.id;
    if (!columns[key]) columns[key] = {...c, board, cards:[]};
    return columns[key];
  });
}

function getCardsForCol(colKey) {
  const search = document.getElementById('search-inp').value.toLowerCase();
  return Object.values(cards).filter(c => {
    if (c.col !== colKey) return false;
    if (search && !c.title.toLowerCase().includes(search)) return false;
    return true;
  });
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const cols = getColsForBoard(currentBoard);
  cols.forEach(col => {
    const colCards = getCardsForCol(col.board+'_'+col.id);
    const div = document.createElement('div');
    div.className = 'column';
    div.dataset.col = col.board+'_'+col.id;
    div.innerHTML = `<div class="col-header">
      <div class="col-dot" style="background:${col.color}"></div>
      <div class="col-title">${col.title}</div>

      ondrop="dropCard(event,'${col.board+'_'+col.id}')"

    <button class="add-card-btn" onclick="openNewCard('${col.board+'_'+col.id}')"><i class="ti ti-plus"></i> Dodaj kartę</button>`;

  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-col-btn';
  addBtn.innerHTML = '<i class="ti ti-plus"></i>';
  addBtn.onclick = addColumn;
  board.appendChild(addBtn);
}

function buildCard(cid) {
  const c = cards[cid];
  const div = document.createElement('div');
  div.className = 'card';
  div.draggable = true;
  div.dataset.card = cid;
  if (c.priority) div.innerHTML += `<div class="card-priority-bar" style="background:${PRIO_COLORS[c.priority]}"></div>`;
  const labels = (c.labels||[]).map(lid => {
    const l = LABELS.find(x=>x.id===lid);
    return l ? `<div class="label-dot" style="background:${l.color};opacity:.7;width:${28+lid.length*2}px"></div>` : '';
  }).join('');
  if (labels) div.innerHTML += `<div class="card-labels">${labels}</div>`;
  div.innerHTML += `<div class="card-title">${c.title}</div>`;
  let meta = '';
  if (c.due) {
    const d = new Date(c.due), now = new Date(); now.setHours(0,0,0,0);
    const diff = Math.ceil((d-now)/86400000);
    const cls = diff<0?'overdue':diff<=3?'due-soon':'';
    meta += `<span class="meta-item ${cls}"><i class="ti ti-calendar"></i>${fmtDate(c.due)}</span>`;
  }
  const checks = c.checklist||[];
  if (checks.length) {
    const done = checks.filter(x=>x.done).length;
    meta += `<span class="meta-item ${done===checks.length?'done-check':''}"><i class="ti ti-check"></i>${done}/${checks.length}</span>`;
  }
  if ((c.comments||[]).length) meta += `<span class="meta-item"><i class="ti ti-message-circle"></i>${c.comments.length}</span>`;
  if (meta) div.innerHTML += `<div class="card-meta">${meta}</div>`;
  div.addEventListener('click', () => openCard(cid));
  div.addEventListener('dragstart', e => { dragCardId=cid; div.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
  div.addEventListener('dragend', () => { div.classList.remove('dragging'); document.querySelectorAll('.col-cards').forEach(x=>x.classList.remove('drag-over')); });
  return div;
}

// ---- DRAG ----
window.dropCard = (e, colKey) => {
  e.preventDefault();
  document.querySelectorAll('.col-cards').forEach(x=>x.classList.remove('drag-over'));
  if (!dragCardId) return;
  const c = cards[dragCardId];
  if (c.col === colKey) return;
  c.col = colKey;
  (c.activity = c.activity||[]).unshift('Przeniesiono do "'+columns[colKey]?.title+'"');
  scheduleSave();
  render();
  toast('Karta przeniesiona');
};

    c.desc = document.getElementById('m-desc').value;
    c.due = document.getElementById('m-due').value;

function renderModalLabels() {
  const c = cards[openCardId];

  }).join('');

window.toggleLabel = (lid) => {

  if (c.labels.includes(lid)) c.labels = c.labels.filter(x=>x!==lid);
  else c.labels.push(lid);

  scheduleSave();
};

function renderChecklist() {
  const c = cards[openCardId];
  const checks = c.checklist||[];
  const done = checks.filter(x=>x.done).length;
  const pct = checks.length ? Math.round(done/checks.length*100) : 0;

    <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px" onclick="removeCheck(${i})"><i class="ti ti-x"></i></button>
  </div>`).join('');
}
window.toggleCheck = (i) => { cards[openCardId].checklist[i].done=!cards[openCardId].checklist[i].done; renderChecklist(); scheduleSave(); };
window.editCheck = (i,el) => { cards[openCardId].checklist[i].text=el.value; scheduleSave(); };
window.removeCheck = (i) => { cards[openCardId].checklist.splice(i,1); renderChecklist(); scheduleSave(); };
window.addCheck = () => { cards[openCardId].checklist=cards[openCardId].checklist||[]; cards[openCardId].checklist.push({text:'Nowy element',done:false}); renderChecklist(); scheduleSave(); };

function renderComments() {
  const c = cards[openCardId];

    <div class="avatar" style="width:24px;height:24px;font-size:10px;flex-shrink:0">${cm.author[0]}</div>

window.addComment = () => {
  const inp = document.getElementById('m-comment');
  const txt = inp.value.trim(); if (!txt) return;

window.openNewCard = (colKey) => {
  const col = colKey || currentBoard+'_'+(BOARD_COLS[currentBoard]||[])[0]?.id;
  const cid = 'c'+(++cardCounter)+'_'+Date.now();

window.duplicateCard = () => {
  const c = cards[openCardId];

  cards[cid] = {...JSON.parse(JSON.stringify(c)), id:cid, title:c.title+' (kopia)', activity:['Zduplikowano']};

window.archiveCard = () => {

window.moveCard = () => {
  const c = cards[openCardId];

  const opts = cols.filter(col=>col.board+'_'+col.id!==c.col).map((col,i)=>`${i+1} - ${col.title}`).join('\n');
  const input = prompt('Przenieś do kolumny:\n\n'+opts+'\n\nPodaj numer:');

};

window.colMenu = (colKey) => {

  else if (a==='2') { if(confirm('Usunąć kolumnę i karty?')){ Object.keys(cards).forEach(cid=>{if(cards[cid].col===colKey)delete cards[cid];}); delete columns[colKey]; scheduleSave(); render(); } }
};
window.addColumn = () => {
  const name = prompt('Nazwa nowej kolumny:'); if (!name) return;

  columns[currentBoard+'_'+id] = {id, board:currentBoard, title:name, color:colors[Math.floor(Math.random()*colors.length)], cards:[]};
  BOARD_COLS[currentBoard] = BOARD_COLS[currentBoard]||[];
  BOARD_COLS[currentBoard].push({id, title:name, color:columns[currentBoard+'_'+id].color});
  scheduleSave(); render();
};

// ---- CALENDAR ----
function renderCalendar() {
  const d = calDate;
  const months = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
  document.getElementById('cal-month-label').textContent = months[d.getMonth()]+' '+d.getFullYear();
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['Pon','Wt','Śr','Czw','Pt','Sob','Nie'].forEach(n => { const h=document.createElement('div'); h.className='cal-day-name'; h.textContent=n; grid.appendChild(h); });
  const first = new Date(d.getFullYear(),d.getMonth(),1);
  let startDay = first.getDay()-1; if(startDay<0)startDay=6;
  const daysInMonth = new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  const prevDays = new Date(d.getFullYear(),d.getMonth(),0).getDate();
  const today = new Date();
  for (let i=0;i<42;i++) {
    const cell = document.createElement('div'); cell.className='cal-day';
    let day, month=d.getMonth(), year=d.getFullYear(), other=false;
    if (i<startDay){day=prevDays-startDay+i+1;month=d.getMonth()-1;other=true;}
    else if (i>=startDay+daysInMonth){day=i-startDay-daysInMonth+1;month=d.getMonth()+1;other=true;}
    else day=i-startDay+1;
    if(other)cell.classList.add('other-month');
    const actual=new Date(year,month,day);
    if(actual.toDateString()===today.toDateString())cell.classList.add('today');
    const numEl=document.createElement('div');numEl.className='cal-num';numEl.textContent=day;cell.appendChild(numEl);
    const dateStr=`${actual.getFullYear()}-${String(actual.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    Object.values(cards).filter(c=>c.due===dateStr).forEach(c=>{
      const ev=document.createElement('div');ev.className='cal-event';
      const l=LABELS.find(x=>x.id===(c.labels||[])[0]);
      ev.style.background=l?l.bg:'var(--bg3)';ev.style.color=l?l.color:'var(--text2)';
      ev.textContent=c.title;ev.onclick=(e)=>{e.stopPropagation();openCard(c.id)};
      cell.appendChild(ev);
    });
    grid.appendChild(cell);
  }
}
window.calPrev = () => { calDate=new Date(calDate.getFullYear(),calDate.getMonth()-1,1); renderCalendar(); };
window.calNext = () => { calDate=new Date(calDate.getFullYear(),calDate.getMonth()+1,1); renderCalendar(); };

// ---- LIST ----
function renderList() {
  const el = document.getElementById('list-rows');
  el.innerHTML = '';
  Object.values(cards).filter(c=>{
    const cols=getColsForBoard(currentBoard);
    return cols.some(col=>col.board+'_'+col.id===c.col);
  }).forEach(c=>{
    const row=document.createElement('div');row.className='list-row';
    const pc=PRIO_COLORS[c.priority]||'transparent';
    row.innerHTML=`<span style="display:flex;align-items:center;gap:7px"><span style="width:3px;height:20px;border-radius:2px;background:${pc};flex-shrink:0"></span>${c.title}</span>
      <span style="color:var(--text2)">${columns[c.col]?.title||''}</span>
      <span style="color:${c.due&&new Date(c.due)<new Date()?'#f87171':'var(--text2)'}">${c.due?fmtDate(c.due):'—'}</span>
      <span style="color:${pc}">${c.priority||'—'}</span>`;
    row.onclick=()=>openCard(c.id);
    el.appendChild(row);
  });
}

// ---- VIEWS ----
window.setView = (v) => {
  currentView=v;
  ['board','cal','list'].forEach(x=>document.getElementById('vb-'+x).classList.toggle('active',x===v));
  render();
};
window.switchBoard = (b) => { currentBoard=b; render(); };
window.sortByPriority = () => {
  const order={high:3,medium:2,low:1};
  // sort cards within each column by priority
  Object.keys(columns).forEach(()=>{});
  // we reorder by rendering sorted
  const cardsCopy = {...cards};
  // just re-render in sorted order
  const sorted = Object.values(cardsCopy).sort((a,b)=>(order[b.priority]||0)-(order[a.priority]||0));
  sorted.forEach(c=>{ cards[c.id]=c; });
  render();
  toast('Posortowano wg priorytetu');
};

// ---- ICS ----
window.exportICS = () => {
  const dated = Object.values(cards).filter(c=>c.due);
  if (!dated.length){toast('Brak kart z terminami');return;}
  let evts='';
  dated.forEach(c=>{const d=c.due.replace(/-/g,'');evts+=`BEGIN:VEVENT\nUID:${c.id}@agaboard\nDTSTAMP:${d}T090000Z\nDTSTART;VALUE=DATE:${d}\nDTEND;VALUE=DATE:${d}\nSUMMARY:${c.title}\nEND:VEVENT\n`;});
  dlFile('agaboard.ics',`BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//AGA Board//PL\n${evts}END:VCALENDAR`,'text/calendar');
  toast(`Eksportowano ${dated.length} kart do iCloud`);
};
window.exportCardICS = () => {
  const c=cards[openCardId]; if(!c.due){toast('Brak terminu');return;}
  const d=c.due.replace(/-/g,'');
  dlFile('event.ics',`BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//AGA Board//PL\nBEGIN:VEVENT\nUID:${c.id}@agaboard\nDTSTAMP:${d}T090000Z\nDTSTART;VALUE=DATE:${d}\nDTEND;VALUE=DATE:${d}\nSUMMARY:${c.title}\nDESCRIPTION:${(c.desc||'').replace(/\n/g,'\\n')}\nEND:VEVENT\nEND:VCALENDAR`,'text/calendar');
  toast('Pobrano .ics — otwórz by dodać do iCloud');
};
function dlFile(name,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();}

// ---- UTILS ----
function fmtDate(s){if(!s)return'';const d=new Date(s);return d.toLocaleDateString('pl-PL',{day:'numeric',month:'short'});}
window.toast = (msg) => {
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
};

// expose for drag events in html
window.ev = event;
document.addEventListener('dragover', e => window.ev = e);
</script>
</body>
</html>
